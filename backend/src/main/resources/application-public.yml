server:
  port: 8080

spring:
  application:
    name: soporte-portales-salud
  datasource:
    url: jdbc:mysql://localhost:3306/soporte_portales_salud?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
    username: soporte_salud
    # Edite esta clave directamente en el servidor. No necesita usar export.
    password: CAMBIAR_PASSWORD_BD_PRODUCCION
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: America/Santiago
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: portalesssm.notifica@gmail.com
    # Edite esta clave directamente en el servidor. Use contraseña de aplicación Gmail SIN espacios.
    password: CAMBIAR_CLAVE_APP_GMAIL_SIN_ESPACIOS
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com

app:
  upload:
    dir: /var/lib/soporte-portales-salud/uploads
    max-files: 5
    max-file-size-bytes: 5242880
  portal:
    public-base-url: https://soporteportales.dssm.cl
    backoffice-base-url: https://soporteportales.dssm.cl
  mail:
    enabled: true
    from: portalesssm.notifica@gmail.com
    from-name: Soporte Portales Salud DSSM
    reply-to: portalesssm.notifica@gmail.com
  security:
    # Reemplace por una clave larga propia del servidor antes de producción.
    jwt-secret: CAMBIAR-JWT-SECRET-LARGO-PRODUCCION-PORTALES-SALUD-DSSM-2026
    jwt-expiration-minutes: 480
  cors:
    allowed-origins: https://soporteportales.dssm.cl,http://localhost:4200
  bootstrap-admin:
    enabled: false
    full-name: Administrador Portales Salud
    email: admin@dssm.cl
    password: 

management:
  endpoints:
    web:
      exposure:
        include: health,info
